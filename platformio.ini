; PlatformIO Project Configuration File v2.2
;
; ReflowDesk: Desktop SMD Reflow Soldering Hot Plate
; Github: https://github.com/atechofficials/ReflowDesk
; Author: Mrinal @atechofficials
; License: General Public License v3.0
;
; Build environments:
;   development  - ESP32 FireBeetle2 development hardware
;   development2 - ESP32-S3 16MB/2MB PSRAM development hardware
;   development2-dcptc - ESP32-S3 16MB development hardware with DC heater PWM enabled
;   at-mk1       - ReflowDesk AT-MK1 ESP32-S3 hardware
;   at-mk1-dcptc - ReflowDesk AT-MK1 ESP32-S3 hardware with DC heater PWM enabled

[platformio]
default_envs = at-mk1

[env]
extra_scripts = post:scripts/merge_factory_bin.py
custom_release_suffix = beta.1

[env:development]
custom_release_board_name = ESP32
platform = espressif32
board = dfrobot_firebeetle2_esp32e
board_build.mcu = esp32
board_build.f_cpu = 240000000L ; 240MHz
framework = arduino
upload_speed = 115200
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.partitions = partitions_4mb_ota.csv
board_build.filesystem = littlefs
build_src_filter = 
	+<*>
	-<web_server.cpp>
lib_deps = 
	https://github.com/adafruit/Adafruit-GFX-Library.git
	https://github.com/adafruit/Adafruit_SSD1306.git
	https://github.com/adafruit/Adafruit_NeoPixel.git
	https://github.com/RobTillaart/MAX6675.git
	https://github.com/RobTillaart/ADS1X15.git
	https://github.com/mathertel/RotaryEncoder.git
	bblanchon/ArduinoJson@^7.4.2
build_flags = 
	-DCORE_DEBUG_LEVEL=3
	-DFIREBEETLE2_ESP32E
	-DREFLOW_DEBUG=1
upload_port = COM4
monitor_port = COM4

[env:development2]
custom_release_board_name = ESP32-S3
platform = espressif32
board = esp32-s3-devkitc1-n16r2
framework = arduino
upload_speed = 115200
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.partitions = partitions_16mb_ota.csv
board_build.filesystem = littlefs
lib_deps = 
	https://github.com/adafruit/Adafruit-GFX-Library.git
	https://github.com/adafruit/Adafruit_SSD1306.git
	https://github.com/adafruit/Adafruit_NeoPixel.git
	https://github.com/RobTillaart/MAX6675.git
	https://github.com/RobTillaart/ADS1X15.git
	https://github.com/mathertel/RotaryEncoder.git
	bblanchon/ArduinoJson@^7.4.2
	tzapu/WiFiManager@^2.0.17
	links2004/WebSockets@^2.6.1
build_flags = 
	-DCORE_DEBUG_LEVEL=3
	-DCONFIG_ARDUINO_LOOP_STACK_SIZE=8192
	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DESP32_S3_PICO
	-DREFLOW_WEB_ENABLED=1
	-DREFLOW_DEBUG=1
upload_port = COM24
monitor_port = COM24

[env:development2-dcptc]
extends = env:development2
custom_release_board_name = ESP32-S3-DC-PTC
build_flags =
	${env:development2.build_flags}
	-DREFLOW_HEATER_DC_PWM=1

[env:at-mk1]
custom_release_board_name = AT-MK1
platform = espressif32
board = esp32-s3-devkitc1-n8r8
framework = arduino
upload_speed = 115200
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.partitions = partitions_8mb_ota.csv
board_build.filesystem = littlefs
lib_deps = 
	https://github.com/adafruit/Adafruit-GFX-Library.git
	https://github.com/adafruit/Adafruit_SSD1306.git
	https://github.com/adafruit/Adafruit_NeoPixel.git
	https://github.com/RobTillaart/MAX6675.git
	https://github.com/RobTillaart/ADS1X15.git
	https://github.com/mathertel/RotaryEncoder.git
	bblanchon/ArduinoJson@^7.4.2
	tzapu/WiFiManager@^2.0.17
	links2004/WebSockets@^2.6.1
build_flags = 
	-DCORE_DEBUG_LEVEL=3
	-DCONFIG_ARDUINO_LOOP_STACK_SIZE=8192
	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DREFLOW_AT_MK1
	-DREFLOW_WEB_ENABLED=1
	-DREFLOW_DEBUG=1
upload_port = COM4
monitor_port = COM4

[env:at-mk1-dcptc]
extends = env:at-mk1
custom_release_board_name = AT-MK1-DC-PTC
build_flags =
	${env:at-mk1.build_flags}
	-DREFLOW_HEATER_DC_PWM=1